name: 'Deploy Service Artifact'
description: 'Download a prepared GitHub artifact, upload it to a VPS, and invoke a remote deployment script.'

inputs:
  artifact_name:
    description: 'Uploaded GitHub Actions artifact name to download.'
    required: false
    default: ''
  artifact_file_name:
    description: 'Expected file name inside the downloaded artifact payload.'
    required: false
    default: ''
  artifact_path:
    description: 'Local artifact path already present in the caller workspace. When set, download-artifact is skipped.'
    required: false
    default: ''
  artifact_extension:
    description: 'Remote artifact file extension, for example .war or .tgz.'
    required: true
  artifact_prefix:
    description: 'Prefix for the remote artifact file.'
    required: true
  remote_artifact_arg:
    description: 'Artifact flag accepted by the remote deploy script, for example --war or --artifact.'
    required: true
  remote_service_name:
    description: 'Service selector passed to the remote deploy dispatcher, for example spring or django.'
    required: true
  deploy_environment:
    description: 'Human-readable environment label for logs and job summary.'
    required: false
    default: ''
  ssh_host:
    description: 'Target VPS hostname or IP.'
    required: true
  ssh_port:
    description: 'Target SSH port.'
    required: false
    default: '22'
  ssh_connect_timeout_seconds:
    description: 'Maximum seconds to wait for SSH connection establishment.'
    required: false
    default: '60'
  ssh_user:
    description: 'Restricted deploy SSH username.'
    required: true
  ssh_private_key:
    description: 'Private SSH key used for deployment.'
    required: true
  ssh_known_hosts:
    description: 'Pinned known_hosts entries for the target VPS.'
    required: false
    default: ''
  deploy_incoming_dir:
    description: 'Deprecated. Uploads now use a per-run remote transfer directory owned by the SSH user.'
    required: false
    default: ''
  deploy_config_path:
    description: 'Remote deployment config path.'
    required: false
    default: '/etc/indraft/indraft.env'
  deploy_script_path:
    description: 'Remote root-owned deploy script path.'
    required: false
    default: '/opt/indraft/deploy/scripts/deploy.sh'
  app_runtime_env_template_path:
    description: 'Optional caller-owned runtime env template path inside the checked out repository workspace.'
    required: false
    default: ''
  app_runtime_env_mode:
    description: 'Runtime env target mode when syncing a template, either spring or django.'
    required: false
    default: ''
  sync_runtime_env:
    description: 'Whether to render and upload the app runtime env template before deployment.'
    required: false
    default: 'true'
  health_path_override:
    description: 'Optional health path override passed to the remote deploy script.'
    required: false
    default: ''
  force_switch:
    description: 'Keep the new slot live even if post-switch validation fails.'
    required: false
    default: ''
  rollback_on_post_switch_failure:
    description: 'Automatically rollback if post-switch validation fails.'
    required: false
    default: ''
  migration_mode_override:
    description: 'Optional migration mode override passed to the remote deploy script.'
    required: false
    default: ''
  commit_signature_policy:
    description: 'Signature verification policy used for this run.'
    required: false
    default: 'strict'
  commit_signature_status:
    description: 'Resolved signature verification status.'
    required: false
    default: ''
  commit_signature_verified:
    description: 'Whether the commit was GitHub-verified.'
    required: false
    default: ''
  commit_signature_reason:
    description: 'GitHub signature verification reason.'
    required: false
    default: ''
  commit_signature_verified_at:
    description: 'When GitHub marked the commit as verified.'
    required: false
    default: ''

outputs:
  release_id:
    description: 'Computed release id for this deployment.'
    value: ${{ steps.prepare.outputs.release_id }}
  build_timestamp:
    description: 'UTC build timestamp used for traceability.'
    value: ${{ steps.prepare.outputs.build_timestamp }}
  artifact_file:
    description: 'Local path to the deploy artifact file.'
    value: ${{ steps.prepare.outputs.artifact_file }}
  remote_artifact_path:
    description: 'Remote uploaded artifact path.'
    value: ${{ steps.remote_deploy.outputs.remote_artifact_path }}

runs:
  using: 'composite'
  steps:
    - name: Download prepared deploy artifact
      if: ${{ inputs.artifact_path == '' }}
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: downloaded-artifact

    - name: Prepare deployment metadata
      id: prepare
      shell: bash
      env:
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        INPUT_ARTIFACT_FILE_NAME: ${{ inputs.artifact_file_name }}
        INPUT_ARTIFACT_PATH: ${{ inputs.artifact_path }}
        INPUT_ARTIFACT_EXTENSION: ${{ inputs.artifact_extension }}
        INPUT_ARTIFACT_PREFIX: ${{ inputs.artifact_prefix }}
        INPUT_DEPLOY_CONFIG_PATH: ${{ inputs.deploy_config_path }}
        INPUT_DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
        INPUT_DEPLOY_INCOMING_DIR: ${{ inputs.deploy_incoming_dir }}
        INPUT_DEPLOY_SCRIPT_PATH: ${{ inputs.deploy_script_path }}
        INPUT_APP_RUNTIME_ENV_TEMPLATE_PATH: ${{ inputs.app_runtime_env_template_path }}
        INPUT_APP_RUNTIME_ENV_MODE: ${{ inputs.app_runtime_env_mode }}
        INPUT_SYNC_RUNTIME_ENV: ${{ inputs.sync_runtime_env }}
        INPUT_FORCE_SWITCH: ${{ inputs.force_switch }}
        INPUT_HEALTH_PATH_OVERRIDE: ${{ inputs.health_path_override }}
        INPUT_MIGRATION_MODE_OVERRIDE: ${{ inputs.migration_mode_override }}
        INPUT_REMOTE_SERVICE_NAME: ${{ inputs.remote_service_name }}
        INPUT_ROLLBACK_ON_POST_SWITCH_FAILURE: ${{ inputs.rollback_on_post_switch_failure }}
        INPUT_SSH_PORT: ${{ inputs.ssh_port }}
      run: |
        set -Eeuo pipefail
        bash "${{ github.action_path }}/scripts/deploy.sh" prepare
    - name: Run remote deployment
      id: remote_deploy
      shell: bash
      env:
        ARTIFACT_FILE: ${{ steps.prepare.outputs.artifact_file }}
        BUILD_TIMESTAMP: ${{ steps.prepare.outputs.build_timestamp }}
        ARTIFACT_EXTENSION: ${{ inputs.artifact_extension }}
        ARTIFACT_PREFIX: ${{ inputs.artifact_prefix }}
        APP_RUNTIME_ENV_MODE: ${{ steps.prepare.outputs.app_runtime_env_mode }}
        APP_RUNTIME_ENV_TEMPLATE_PATH: ${{ steps.prepare.outputs.app_runtime_env_template_path }}
        DEPLOY_CONFIG_PATH: ${{ steps.prepare.outputs.deploy_config_path }}
        DEPLOY_INCOMING_DIR: ${{ steps.prepare.outputs.deploy_incoming_dir }}
        DEPLOY_SCRIPT_PATH: ${{ steps.prepare.outputs.deploy_script_path }}
        FORCE_SWITCH: ${{ steps.prepare.outputs.force_switch }}
        HEALTH_PATH_OVERRIDE: ${{ steps.prepare.outputs.health_path_override }}
        MIGRATION_MODE_OVERRIDE: ${{ steps.prepare.outputs.migration_mode_override }}
        RELEASE_ID: ${{ steps.prepare.outputs.release_id }}
        REMOTE_ARTIFACT_ARG: ${{ inputs.remote_artifact_arg }}
        REMOTE_SERVICE_NAME: ${{ inputs.remote_service_name }}
        ROLLBACK_ON_POST_SWITCH_FAILURE: ${{ steps.prepare.outputs.rollback_on_post_switch_failure }}
        SYNC_RUNTIME_ENV: ${{ steps.prepare.outputs.sync_runtime_env }}
        SSH_CONNECT_TIMEOUT_SECONDS: ${{ inputs.ssh_connect_timeout_seconds }}
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_KNOWN_HOSTS: ${{ inputs.ssh_known_hosts }}
        SSH_PORT: ${{ steps.prepare.outputs.ssh_port }}
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        SSH_USER: ${{ inputs.ssh_user }}
      run: |
        set -Eeuo pipefail
        bash "${{ github.action_path }}/scripts/deploy.sh" deploy

    - name: Write deployment summary
      if: always()
      shell: bash
      env:
        ARTIFACT_FILE: ${{ steps.prepare.outputs.artifact_file }}
        BUILD_TIMESTAMP: ${{ steps.prepare.outputs.build_timestamp }}
        APP_RUNTIME_ENV_MODE: ${{ steps.prepare.outputs.app_runtime_env_mode }}
        APP_RUNTIME_ENV_TEMPLATE_PATH: ${{ steps.prepare.outputs.app_runtime_env_template_path }}
        COMMIT_SIGNATURE_POLICY: ${{ inputs.commit_signature_policy }}
        COMMIT_SIGNATURE_REASON: ${{ inputs.commit_signature_reason }}
        COMMIT_SIGNATURE_STATUS: ${{ inputs.commit_signature_status }}
        COMMIT_SIGNATURE_VERIFIED: ${{ inputs.commit_signature_verified }}
        COMMIT_SIGNATURE_VERIFIED_AT: ${{ inputs.commit_signature_verified_at }}
        DEPLOY_ENVIRONMENT: ${{ steps.prepare.outputs.deploy_environment }}
        DEPLOY_SCRIPT_PATH: ${{ steps.prepare.outputs.deploy_script_path }}
        FORCE_SWITCH: ${{ steps.prepare.outputs.force_switch }}
        HEALTH_PATH_OVERRIDE: ${{ steps.prepare.outputs.health_path_override }}
        HOST_KEY_SOURCE: ${{ env.host_key_source }}
        MIGRATION_MODE_OVERRIDE: ${{ steps.prepare.outputs.migration_mode_override }}
        REMOTE_ARTIFACT_ARG: ${{ inputs.remote_artifact_arg }}
        REMOTE_ARTIFACT_PATH: ${{ steps.remote_deploy.outputs.remote_artifact_path }}
        REMOTE_DEPLOY_OUTCOME: ${{ steps.remote_deploy.outcome }}
        REMOTE_SERVICE_NAME: ${{ inputs.remote_service_name }}
        RELEASE_ID: ${{ steps.prepare.outputs.release_id }}
        ROLLBACK_ON_POST_SWITCH_FAILURE: ${{ steps.prepare.outputs.rollback_on_post_switch_failure }}
        SYNC_RUNTIME_ENV: ${{ steps.prepare.outputs.sync_runtime_env }}
        SSH_CONNECT_TIMEOUT_SECONDS: ${{ inputs.ssh_connect_timeout_seconds }}
      run: |
        set -Eeuo pipefail
        bash "${{ github.action_path }}/scripts/deploy.sh" summary
